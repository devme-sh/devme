name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false

          - name: linux-aarch64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true

          - name: macos-x86_64
            runner: macos-13          # Intel runner
            target: x86_64-apple-darwin
            cross: false

          - name: macos-aarch64
            runner: macos-latest      # Apple Silicon runner
            target: aarch64-apple-darwin
            cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (Linux ARM64 only)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi

      - name: Package binaries
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"            # e.g. v0.1.0
          target="${{ matrix.target }}"
          staging="devme-${target}"
          mkdir -p "$staging"

          # Copy all binaries into the staging directory
          for bin in devme devme-tui devme-supervisor devme-shared-supervisor; do
            src="target/${target}/release/${bin}"
            if [ -f "$src" ]; then
              cp "$src" "$staging/"
            fi
          done

          # Create tarball
          archive="devme-${target}.tar.gz"
          tar czf "$archive" -C "$staging" .

          # SHA-256 checksum
          if command -v sha256sum > /dev/null; then
            sha256sum "$archive" > "${archive}.sha256"
          else
            shasum -a 256 "$archive" > "${archive}.sha256"
          fi

          echo "ARCHIVE=$archive" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: devme-${{ matrix.target }}
          path: |
            devme-${{ matrix.target }}.tar.gz
            devme-${{ matrix.target }}.tar.gz.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (for changelog context)
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            devme-*.tar.gz
            devme-*.tar.gz.sha256
