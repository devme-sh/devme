name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false

          - name: linux-aarch64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true

          - name: macos-aarch64
            runner: macos-latest      # Apple Silicon runner
            target: aarch64-apple-darwin
            cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (Linux ARM64 only)
        if: matrix.cross
        run: cargo install cross

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package binaries
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"            # e.g. v0.1.0
          target="${{ matrix.target }}"
          staging="devme-${target}"
          mkdir -p "$staging"

          # Copy all binaries into the staging directory
          for bin in devme devme-tui devme-supervisor devme-shared-supervisor; do
            src="target/${target}/release/${bin}"
            if [ -f "$src" ]; then
              cp "$src" "$staging/"
            fi
          done

          # Create tarball
          archive="devme-${target}.tar.gz"
          tar czf "$archive" -C "$staging" .

          # SHA-256 checksum
          if command -v sha256sum > /dev/null; then
            sha256sum "$archive" > "${archive}.sha256"
          else
            shasum -a 256 "$archive" > "${archive}.sha256"
          fi

          echo "ARCHIVE=$archive" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: devme-${{ matrix.target }}
          path: |
            devme-${{ matrix.target }}.tar.gz
            devme-${{ matrix.target }}.tar.gz.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (for changelog context)
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            devme-*.tar.gz
            devme-*.tar.gz.sha256

  update-homebrew:
    name: Update Homebrew formula
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: devme-sh/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Update formula
        run: |
          version="${GITHUB_REF_NAME#v}"
          formula="Formula/devme.rb"

          sha_darwin_arm=$(awk '{print $1}' artifacts/devme-aarch64-apple-darwin.tar.gz.sha256)
          sha_linux_arm=$(awk '{print $1}' artifacts/devme-aarch64-unknown-linux-gnu.tar.gz.sha256)
          sha_linux_x86=$(awk '{print $1}' artifacts/devme-x86_64-unknown-linux-gnu.tar.gz.sha256)

          sed -i "s/version \".*\"/version \"${version}\"/" "$formula"

          # Update SHA256 values in order of appearance (macOS ARM, Linux ARM, Linux Intel)
          python3 -c "
          import re
          with open('$formula') as f:
              content = f.read()
          shas = ['$sha_darwin_arm', '$sha_linux_arm', '$sha_linux_x86']
          i = 0
          def replace_sha(m):
              global i
              result = f'sha256 \"{shas[i]}\"'
              i += 1
              return result
          content = re.sub(r'sha256 \"[^\"]+\"', replace_sha, content)
          with open('$formula', 'w') as f:
              f.write(content)
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/devme.rb
          git commit -m "devme ${GITHUB_REF_NAME}"
          git push
